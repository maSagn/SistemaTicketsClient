<div class="form-container">
  <form [formGroup]="productoForm" (ngSubmit)="guardar()" class="card form-card">

    <div class="card-header text-center">
      <h3 class="mb-0">Producto</h3>
      <small class="text-muted">{{ idProducto ? 'Editar' : 'Registrar' }}</small>
    </div>

    <div class="card-body">

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" formControlName="nombre" class="form-control" placeholder="Ej: Laptop">
      </div>

      <div class="mb-3">
        <label class="form-label">Precio unitario</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" formControlName="precioUnitario" class="form-control" placeholder="0.00">
        </div>
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea formControlName="descripcion" class="form-control" rows="3"
          placeholder="Descripción del producto"></textarea>
      </div>

    </div>

    <div class="card-footer d-flex justify-content-end gap-2">
      <a [routerLink]="['/productos']" type="button" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Guardar</button>
    </div>

  </form>
</div>
