<div class="form-container">
  <form [formGroup]="productoForm" (ngSubmit)="guardar()" class="card form-card animate__animated animate__bounceInDown">

    <div class="card-header text-center">
      <h3 class="mb-0">Producto</h3>
      <small class="text-muted">{{ idProducto ? 'Editar' : 'Registrar' }}</small>
    </div>

    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Imagen:</label>
        <img *ngIf="previewImagen" [src]="previewImagen" class="product-img mb-2">
        <img *ngIf="!previewImagen" src="https://kints.co.in/twenty-nineteen/img/defaults/product-default.png" class="product-img mb-2">

        <input type="file" class="form-control" accept="image/*" (change)="onFileSelect($event)" name="imagen" id="imagen">
      </div>

      <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" formControlName="nombre" class="form-control" placeholder="Ej: Laptop">
        <span class="error-msg" *ngIf="productoForm.get('nombre')?.touched && productoForm.get('nombre')?.invalid">
          No se permiten los caracteres [!#$&/]
        </span>
      </div>

      <div class="mb-3">
        <label class="form-label">Precio unitario</label>
        <div class="input-group">
          <span class="input-group-text">$</span>
          <input type="number" formControlName="precioUnitario" class="form-control" placeholder="0.00">
          
        </div>
        <span class="error-msg" *ngIf="productoForm.get('precioUnitario')?.touched && productoForm.get('precioUnitario')?.invalid">
            Solo se permiten numeros mayores a cero.
          </span>
      </div>

      <div class="mb-3">
        <label class="form-label">Descripción</label>
        <textarea formControlName="descripcion" class="form-control" rows="3"
          placeholder="Descripción del producto"></textarea>
          <span class="error-msg" *ngIf="productoForm.get('descripcion')?.touched && productoForm.get('descripcion')?.invalid">
            No se permiten los caracteres [!#$&/]
        </span>
      </div>

    </div>

    <div class="card-footer d-flex justify-content-end gap-2">
      <a [routerLink]="['/productos']" type="button" class="btn btn-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Guardar</button>
    </div>

  </form>
</div>
