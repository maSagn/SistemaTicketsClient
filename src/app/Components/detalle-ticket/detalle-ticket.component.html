<!-- Spinner mientras carga -->
<div *ngIf="cargando" class="text-center my-3">
    <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Cargando...</span>
    </div>
</div>

<!-- Mensaje de error -->
<div *ngIf="error" class="alert alert-danger">
    {{ error }}
</div>

<!-- Tabla de detalles -->
<table *ngIf="!cargando && detallesTicket.length > 0" class="table table-striped table-hover">
    <thead class="table-dark">
        <tr>
            <th>#</th>
            <th>Imagen</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Precio Unitario</th>
            <th>Total Línea</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let detalle of detallesTicket; let i = index">
            <th scope="row">{{ i + 1 }}</th>
            <td>
                <img *ngIf="detalle.Producto?.imagen; else placeholder" [src]="detalle.Producto?.imagen" alt="Foto de perfil"
                    class="profile-img">

                <ng-template #placeholder>
                    <img src="https://apollobattery.com.au/wp-content/uploads/2022/08/default-product-image.png" alt="Sin imagen"
                        class="profile-img">
                </ng-template>
            </td>
            <td>{{ detalle.Producto?.nombre }}</td>
            <td>{{ detalle.cantidad }}</td>
            <td>{{ detalle.precioUnitario | currency }}</td>
            <td>{{ detalle.totalLinea | currency }}</td>
        </tr>
    </tbody>
</table>

<!-- Mensaje si no hay detalles -->
<div *ngIf="!cargando && detallesTicket.length === 0" class="text-center text-muted my-3">
    No hay detalles para este ticket.
</div>
